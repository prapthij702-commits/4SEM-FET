<!DOCTYPE html>
<html>
<head>
    <title>UL and OL Example</title>
    <style>
        body {
            background-color: skyblue;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: darkblue;
        }

        ul {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
        }

        li {
            margin: 10px 0;
        }

        ol {
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <h2>Daily Routine timetable</h2>

    <ul>
        <li>Morning
            <ol>  
                <li>Wake up</li>
                <li>Brush teeth</li>
                <li>Exercise</li>
            </ol>
        </li>

        <li>Afternoon
            <ol>
                <li>Have lunch</li>
                <li>Study / Work</li>
            </ol>
        </li>

        <li>Evening
            <ol>
                <li>Play / Relax</li>
                <li>Dinner</li>
                <li>Sleep</li>
            </ol>
        </li>
    </ul>
</body>
</html>
